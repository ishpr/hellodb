name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  # NOTE: we deliberately do NOT set RUSTFLAGS: -D warnings at workflow scope.
  # Doing so propagates into release builds and turns harmless deprecation /
  # dead-code warnings from transitive deps into fatal build errors. We
  # enforce -D warnings only where we own the code: the clippy step below.

jobs:
  # -----------------------------------------------------------------------
  # Fast check lane: always runs. Blocks the build matrix on PRs.
  # -----------------------------------------------------------------------
  check:
    name: check + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (sqlcipher via bundled-sqlcipher needs these)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --all-targets

      - name: Validate plugin + marketplace manifests
        run: |
          # Lightweight JSON schema sanity (no claude CLI in CI)
          python3 -c "import json; json.load(open('plugin/.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('plugin/.mcp.json'))"
          python3 -c "import json; json.load(open('plugin/hooks/hooks.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

  # -----------------------------------------------------------------------
  # Gateway (TypeScript + Wrangler) lane: tsc strict + vitest.
  # -----------------------------------------------------------------------
  gateway:
    name: gateway (ts + vitest)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gateway/package-lock.json
      - run: npm ci
      - name: Generate Wrangler runtime types
        run: npx wrangler types
      - name: tsc strict
        run: npx tsc --noEmit
      - run: npm test -- --run
      - name: wrangler deploy --dry-run
        run: npx wrangler deploy --dry-run

  # -----------------------------------------------------------------------
  # Per-platform release builds. Run on push to main and on tagged releases.
  # -----------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    needs: [check, gateway]
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon
            target: aarch64-apple-darwin
            exe_suffix: ""
          - os: macos-13            # Intel Mac
            target: x86_64-apple-darwin
            exe_suffix: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""
          - os: ubuntu-22.04-arm    # ARM64 Linux runner
            target: aarch64-unknown-linux-gnu
            exe_suffix: ""
          - os: windows-2022        # Windows x86_64 (MSVC)
            target: x86_64-pc-windows-msvc
            exe_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config

      # NOTE: Windows needs nasm + a recent perl for openssl-src's vendored
      # OpenSSL build. Both are preinstalled on windows-2022 runners
      # (Strawberry Perl for perl; NASM under Chocolatey). Verify:
      - name: Verify Windows build prereqs
        if: runner.os == 'Windows'
        shell: bash
        run: |
          perl --version | head -1
          # nasm is auto-picked up by openssl-src

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Pin Perl for openssl-src on Windows only
        if: runner.os == 'Windows'
        shell: bash
        # On Windows, running cargo from MSYS2 bash causes openssl-sys to pick
        # up the wrong perl (MSYS2's, missing required modules like
        # Locale::Maketext::Simple). Pin it to Strawberry Perl which ships
        # with the windows-2022 runner.
        #
        # MUST be done in its own step (not an inline `env:` on the cargo
        # step with a `${{ }}` expression) because GitHub Actions can't
        # conditionally REMOVE an env var — `OPENSSL_SRC_PERL=''` still sets
        # it to empty string, which openssl-src dutifully tries to exec.
        # That broke Linux + macOS builds last time.
        run: echo "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe" >> "$GITHUB_ENV"

      - name: cargo build --release
        shell: bash
        # Scope to the three shipping crates via -p. Using plain `--bin X`
        # is ambiguous since `hellodb-cli` publishes the `hellodb` binary,
        # not a crate named `hellodb`. This also skips building test binaries
        # and crates that aren't on the ship path (auth, core, crypto, query
        # are built transitively as deps, not standalone).
        run: cargo build --release --target ${{ matrix.target }} -p hellodb-cli -p hellodb-mcp -p hellodb-brain

      - name: Bundle plugin artifact (POSIX)
        if: runner.os != 'Windows'
        run: ./scripts/bundle-plugin.sh ${{ matrix.target }}

      - name: Bundle plugin artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p plugin/bin
          for bin in hellodb hellodb-mcp hellodb-brain; do
            cp "target/${{ matrix.target }}/release/${bin}.exe" "plugin/bin/${bin}.exe"
          done

      - name: Package tarball
        shell: bash
        run: |
          mkdir -p dist
          tar -czf "dist/hellodb-plugin-${{ matrix.target }}.tar.gz" \
              --exclude='plugin/bin/.gitkeep' plugin \
              .claude-plugin/marketplace.json
          if command -v shasum >/dev/null 2>&1; then
            (cd dist && shasum -a 256 "hellodb-plugin-${{ matrix.target }}.tar.gz" > "hellodb-plugin-${{ matrix.target }}.tar.gz.sha256")
          else
            (cd dist && sha256sum "hellodb-plugin-${{ matrix.target }}.tar.gz" > "hellodb-plugin-${{ matrix.target }}.tar.gz.sha256")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: hellodb-plugin-${{ matrix.target }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

  # -----------------------------------------------------------------------
  # Tagged release: attach all platform tarballs to a GitHub Release.
  # -----------------------------------------------------------------------
  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: hellodb-plugin-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
